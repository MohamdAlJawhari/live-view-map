{% extends "layout.html" %}

{% block title %}Draw Polygon{% endblock %}

{% block content %}
<div style="padding: 20px;">
    <h1>Draw Polygon</h1>

    <form method="POST" id="polygon-form" style="margin-bottom: 20px; max-width: 500px;">
        <div style="margin-bottom: 12px;">
            <label>Name</label><br>
            <input type="text" name="name" required style="width: 100%; padding: 8px;">
        </div>

        <div style="margin-bottom: 12px;">
            <label>Color</label><br>
            <input type="text" name="color" value="red" required style="width: 100%; padding: 8px;">
        </div>

        <div style="margin-bottom: 12px;">
            <label>Coordinates</label><br>
            <textarea id="coordinates" name="coordinates" required readonly
                style="width: 100%; padding: 8px; height: 120px;"></textarea>
        </div>

        <button type="submit">Save Polygon</button>
        <a href="{{ url_for('polygons.admin_polygons') }}">Cancel</a>
    </form>

    <div id="draw-map" style="height: 600px; border: 1px solid #ccc;"></div>
</div>

<!-- <script src="{{ url_for('static', filename='js/draw_polygon.js') }}"></script> -->
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/draw_polygon.js') }}"></script>
{% endblock %}
