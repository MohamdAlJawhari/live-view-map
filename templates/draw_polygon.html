{% extends "layout.html" %}

{% block title %}Draw Polygon{% endblock %}

{% block content %}
<div class="page-shell">
    <section class="map-card">
        <div class="page-header">
            <div>
                <h1>Draw Polygon</h1>
                <p class="page-subtitle">Trace a polygon on the map, then save the generated coordinates.</p>
            </div>
        </div>

        <form method="POST" id="polygon-form" class="form-grid compact-form">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" required>
            </div>

            <div class="field">
                <label for="color">Color</label>
                <input id="color" type="text" name="color" value="red" required>
            </div>

            <div class="field">
                <label for="coordinates">Coordinates</label>
                <textarea id="coordinates" name="coordinates" required readonly></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="button">Save Polygon</button>
                <a href="{{ url_for('polygons.admin_polygons') }}" class="button button-secondary">Cancel</a>
            </div>
        </form>

        <div id="draw-map" class="map-frame"></div>
    </section>
</div>

<!-- <script src="{{ url_for('static', filename='js/draw_polygon.js') }}"></script> -->
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/draw_polygon.js') }}"></script>
{% endblock %}
