{% set login_active = request.endpoint == "auth.login" %}

<nav class="app-nav" aria-label="Public navigation">
    <div class="app-nav__inner">
        <form method="POST" action="{{ url_for('main.set_clustering') }}" class="nav-switch-form nav-item nav-item--switch{% if use_clustering %} is-active{% endif %}">
            <input type="hidden" name="next" value="{{ request.path }}">
            <input type="hidden" name="enabled" value="{{ 'true' if use_clustering else 'false' }}">

            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="7" cy="8" r="2"></circle>
                    <circle cx="17" cy="8" r="2"></circle>
                    <circle cx="12" cy="16" r="2"></circle>
                    <path d="M8.7 9.1 10.3 14"></path>
                    <path d="M15.3 9.1 13.7 14"></path>
                    <path d="M9 8h6"></path>
                </svg>
            </span>
            <span class="nav-label">Marker Clustering</span>

            <label class="nav-switch" for="public-marker-clustering-switch">
                <input
                    id="public-marker-clustering-switch"
                    class="nav-switch__input"
                    type="checkbox"
                    role="switch"
                    aria-label="Toggle marker clustering"
                    {% if use_clustering %}checked{% endif %}
                    onchange="this.form.elements['enabled'].value = this.checked ? 'true' : 'false'; this.form.submit();"
                >
                <span class="nav-switch__track" aria-hidden="true">
                    <span class="nav-switch__thumb"></span>
                </span>
            </label>
        </form>

        <a href="{{ url_for('auth.login') }}" class="nav-item{% if login_active %} is-active{% endif %}">
            <span class="nav-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M10 6H7a3 3 0 0 0-3 3v6a3 3 0 0 0 3 3h3"></path>
                    <path d="M14 8l5 4-5 4"></path>
                    <path d="M9 12h10"></path>
                </svg>
            </span>
            <span class="nav-label">Log In</span>
        </a>
    </div>
</nav>
