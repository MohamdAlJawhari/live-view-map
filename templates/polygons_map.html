{% extends "layout.html" %}

{% block content %}
<div class="page-shell">
    <section class="map-card">
        <div class="page-header">
            <div>
                <h1>Polygon Map Manager</h1>
                <p class="page-subtitle">Maintain polygon shapes visually and save the full region set in one step.</p>
            </div>
        </div>

        <form method="POST" id="save-form" class="map-toolbar">
            <input type="hidden" name="data" id="map-data">
            <button type="submit" class="button">Save All Changes</button>
            <a href="{{ url_for('polygons.admin_polygons') }}" class="button button-secondary">Back</a>
        </form>

        <div id="admin-map" class="map-frame"></div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
    const polygons = {{ polygons | tojson }};
</script>
<script src="{{ url_for('static', filename='js/polygons_map.js') }}"></script>
{% endblock %}
