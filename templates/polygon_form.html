{% extends "layout.html" %}

{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="form-shell">
    <section class="form-card">
        <div class="page-header">
            <div>
                <h1>{{ form_title }}</h1>
                <p class="page-subtitle">Edit polygon metadata directly as JSON coordinates when you need precise control.</p>
            </div>
        </div>

        <form method="POST" class="form-grid">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" required value="{{ polygon.name if polygon else '' }}">
            </div>

            <div class="field">
                <label for="color">Color</label>
                <input id="color" type="text" name="color" required value="{{ polygon.color if polygon else 'red' }}">
            </div>

            <div class="field">
                <label for="coordinates">Coordinates (JSON format)</label>
                <textarea id="coordinates" name="coordinates" required>{{ polygon.coordinates if polygon else '[[33.80, 35.40], [33.90, 35.50], [33.85, 35.65]]' }}</textarea>
            </div>

            <p class="code-hint">
                Example:
                <code>[[33.80, 35.40], [33.90, 35.50], [33.85, 35.65]]</code>
            </p>

            <div class="form-actions">
                <button type="submit" class="button">Save</button>
                <a href="{{ url_for('polygons.admin_polygons') }}" class="button button-secondary">Cancel</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
