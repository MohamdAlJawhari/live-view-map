{% extends "layout.html" %}

{% block title %}Edit Polygon on Map{% endblock %}

{% block content %}
<div class="page-shell">
    <section class="map-card">
        <div class="page-header">
            <div>
                <h1>Edit Polygon on Map</h1>
                <p class="page-subtitle">Adjust an existing polygon shape and save the updated coordinates.</p>
            </div>
        </div>

        <form method="POST" class="form-grid compact-form">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" value="{{ polygon.name }}" required>
            </div>

            <div class="field">
                <label for="color">Color</label>
                <input id="color" type="text" name="color" value="{{ polygon.color }}" required>
            </div>

            <div class="field">
                <label for="coordinates">Coordinates</label>
                <textarea id="coordinates" name="coordinates" required readonly>{{ polygon.coordinates | tojson | safe }}</textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="button">Save Changes</button>
                <a href="{{ url_for('polygons.admin_polygons') }}" class="button button-secondary">Cancel</a>
            </div>
        </form>

        <div id="edit-map" class="map-frame"></div>
    </section>
</div>
{% endblock %}

{% block scripts %}
<script>
    const polygonData = {{ polygon | tojson }};
</script>
<script src="{{ url_for('static', filename='js/edit_polygon_map.js') }}"></script>
{% endblock %}
