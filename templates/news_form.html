{% extends "layout.html" %}

{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="form-shell">
    <section class="form-card">
        <div class="page-header">
            <div>
                <h1>{{ form_title }}</h1>
                <p class="page-subtitle">Create or update a news marker and control whether it appears on the public map.</p>
            </div>
        </div>

        <form method="POST" class="form-grid">
            <div class="field">
                <label for="title">Title</label>
                <input id="title" type="text" name="title" required value="{{ news_item.title if news_item else '' }}">
            </div>

            <div class="field">
                <label for="description">Description</label>
                <textarea id="description" name="description" required>{{ news_item.description if news_item else '' }}</textarea>
            </div>

            <div class="field-grid">
                <div class="field">
                    <label for="latitude">Latitude</label>
                    <input id="latitude" type="number" step="any" name="latitude" required value="{{ news_item.latitude if news_item else '' }}">
                </div>

                <div class="field">
                    <label for="longitude">Longitude</label>
                    <input id="longitude" type="number" step="any" name="longitude" required value="{{ news_item.longitude if news_item else '' }}">
                </div>
            </div>

            <div class="field-grid">
                <div class="field">
                    <label for="marker_type">Marker Type</label>
                    <input id="marker_type" type="text" name="marker_type" required value="{{ news_item.marker_type if news_item else '' }}">
                </div>

                <div class="field">
                    <label for="region_name">Region Name</label>
                    <input id="region_name" type="text" name="region_name" value="{{ news_item.region_name if news_item else '' }}">
                </div>
            </div>

            <div class="field">
                <label for="source_url">Source URL</label>
                <input id="source_url" type="text" name="source_url" value="{{ news_item.source_url if news_item else '' }}">
            </div>

            <label class="checkbox-row">
                <input type="checkbox" name="is_visible" {% if news_item and news_item.is_visible %}checked{% endif %}>
                <span>Visible on public map</span>
            </label>

            <div class="form-actions">
                <button type="submit" class="button">Save</button>
                <a href="{{ url_for('news.admin_news') }}" class="button button-secondary">Cancel</a>
            </div>
        </form>
    </section>
</div>
{% endblock %}
